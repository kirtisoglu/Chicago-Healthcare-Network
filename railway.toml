[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "panel serve healthcare/dashboard.py --address 0.0.0.0 --port $PORT --allow-websocket-origin='chicago-healthcare-dashboard.up.railway.app' --allow-websocket-origin='www.kirtisoglu.me' --num-procs 1"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
